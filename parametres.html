<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametres</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

    <div class="p-8">
        <h1 class="text-3xl font-bold">Parametres</h1>
            <p class="mt-2 text-slate-600">
            C'est ici que tu peux changer t'es parametres.
        </p>
       
</div>

         <!-- Mode sombre -->
    <div class="flex justify-between items-center mb-6">
        <span class="font-medium">🌙 Mode sombre</span>

        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="darkMode" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-300 rounded-full peer-checked:bg-green-600"></div>
        </label>
    </div>

    <!-- Sons -->
    <div class="flex justify-between items-center mb-6">
        <span class="font-medium">🔊 Sons du Snake</span>

        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="snakeSound" class="sr-only peer" checked>
            <div class="w-11 h-6 bg-gray-300 rounded-full peer-checked:bg-green-600"></div>
        </label>
    </div>

    <!-- Vitesse -->
    <div class="mb-6">
        <label class="font-medium block mb-2">
            ⚡ Vitesse du Snake
        </label>

        <select
            id="snakeSpeed"
            class="border rounded-lg px-3 py-2 w-full">

            <option value="180">Rapide</option>
            <option value="120" selected>Normal</option>
            <option value="80">Très rapide</option>
            <option value="250">Lent</option>

        </select>
    </div>

</div>

<script>

// Sauvegarde paramètres
document.getElementById("darkMode").addEventListener("change", function() {
    localStorage.setItem("darkMode", this.checked);
});

document.getElementById("snakeSound").addEventListener("change", function() {
    localStorage.setItem("snakeSound", this.checked);
});

document.getElementById("snakeSpeed").addEventListener("change", function() {
    localStorage.setItem("snakeSpeed", this.value);
});

// Chargement paramètres
if(localStorage.getItem("darkMode") === "true"){
    document.body.classList.add("bg-slate-900");
    document.body.classList.remove("bg-slate-100");
    document.getElementById("darkMode").checked = true;
}

if(localStorage.getItem("snakeSound") === "false"){
    document.getElementById("snakeSound").checked = false;
}

if(localStorage.getItem("snakeSpeed")){
    document.getElementById("snakeSpeed").value =
        localStorage.getItem("snakeSpeed");
}

</script>

<div>
        <a href="test.html"
           class="inline-block mt-6 px-4 py-2 bg-blue-600 text-white rounded-lg">
            Retour a l'application
        </a>
</div>

</body>
</html>
