<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données Impulseo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* Style pour l'écran de chargement */
        #loader {
            position: fixed;
            inset: 0;
            background-color: #0f172a;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader">
        <div class="spinner mb-4"></div>
        <h2 class="text-white font-medium tracking-wider">Arrivé du site...</h2>
    </div>

    <div class="min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-64 bg-slate-900 text-slate-300 p-6 flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <i class="fa-solid fa-chart-pie text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white tracking-wide">Impulseo</span>
                </div>
                <nav class="space-y-2">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 bg-slate-800 text-white rounded-xl transition-all"><i class="fa-solid fa-house"></i> Présentation </a>
                                       <a href="./jeux.html"
   class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
    <i class="fa-solid fa-wallet"></i>
    Jeux Impulseo
</a>
                                                         <a href="./parametres.html"
   class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
    <i class="fa-solid fa-wallet"></i>
    Parametres
</a>
                </nav>
            </div>
            <div class="pt-6 border-t border-slate-800 text-sm flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">L</div>
                <div>
                    <p class="text-white font-medium text-xs">Leo Montreuil</p>
                    <p class="text-slate-500 text-xs">Administrateur</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10 space-y-8">
            
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">Tableau de bord</h1>
                    <p class="text-slate-500">Nouveautés en temps réel</p>
                </div>
            </header>

            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-400 uppercase tracking-wider">Chiffre d'Affaires</p>
                        <h3 id="kpi-revenue" class="text-3xl font-bold mt-2 text-slate-900">14 250 €</h3>
                        <span class="text-xs text-emerald-500 font-semibold bg-emerald-50 px-2 py-0.5 rounded-full mt-2 inline-block">
                            <i class="fa-solid fa-arrow-trend-up mr-1"></i> +12% ce mois
                        </span>
                    </div>
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-euro-sign"></i>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-400 uppercase tracking-wider">Jeux télécharger</p>
                        <h3 id="kpi-sessions" class="text-3xl font-bold mt-2 text-slate-900">342</h3>
                        <span class="text-xs text-blue-500 font-semibold bg-blue-50 px-2 py-0.5 rounded-full mt-2 inline-block">
                            <i class="fa-solid fa-bolt mr-1"></i> Temps réel
                        </span>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-users"></i>
                    </div>
                </div>
            </section>

            <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-slate-900">Activité du trafic</h3>
                        <span class="text-xs text-slate-400">Mise à jour dynamique</span>
                    </div>
                    <div class="relative h-64">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // --- 1. Gestion de l'animation de chargement (Loader) ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                addLog("Dashboard prêt et entièrement chargé.");
            }, 800); // Petit délai pour apprécier l'animation
        });

        // --- 2. Fonctions Utilitaires (Logs) ---
        const logContainer = document.getElementById('log-container');
        function addLog(message, type = 'info') {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            const p = document.createElement('p');
            
            if(type === 'success') p.className = 'text-emerald-400';
            else if(type === 'warning') p.className = 'text-amber-400';
            else p.className = 'text-slate-300';
            
            p.innerHTML = `<span class="text-slate-600">[${timeStr}]</span> ${message}`;
            logContainer.appendChild(p);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // --- 3. Initialisation du Graphique (Chart.js) ---
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                datasets: [{
                    label: 'Visiteurs uniques',
                    data: [1200, 1900, 1500, 2100, 1800, 2400, 3100],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });

        // --- 4. Boutons et Interactions Dynamiques ---

        // Bouton d'action principale : simule la création de données
        const btnAction = document.getElementById('btn-action');
        btnAction.addEventListener('click', () => {
            // Effet d'ondulation rapide ou changement temporaire de couleur
            addLog("Événement utilisateur généré manuellement.", "success");
            
            // Simulation d'une hausse aléatoire d'un KPI
            const sessionKpi = document.getElementById('kpi-sessions');
            let currentSessions = parseInt(sessionKpi.innerText);
            const increment = Math.floor(Math.random() * 15) + 5;
            sessionKpi.innerText = currentSessions + increment;
            
            // Animation flash sur la valeur mise à jour
            sessionKpi.classList.add('text-blue-600', 'scale-105');
            setTimeout(() => sessionKpi.classList.remove('text-blue-600', 'scale-105'), 500);
            
            // Ajouter une donnée aléatoire au graphique
            trafficChart.data.datasets[0].data.shift();
            trafficChart.data.datasets[0].data.push(Math.floor(Math.random() * 2000) + 1500);
            trafficChart.update();
        });

        // Bouton d'actualisation globale avec rotation CSS
        const btnRefresh = document.getElementById('btn-refresh');
        btnRefresh.addEventListener('click', () => {
            addLog("Mise à jour globale des données lancée...", "warning");
            
            // Simulation de chargement asynchrone des KPI
            setTimeout(() => {
                document.getElementById('kpi-revenue').innerText = (Math.floor(Math.random() * 5000) + 12000).toLocaleString('fr-FR') + " €";
                document.getElementById('kpi-conversion').innerText = (Math.random() * 2 + 1.5).toFixed(1) + " %";
                
                // Mettre à jour l'ensemble du graphique
                trafficChart.data.datasets[0].data = Array.from({length: 7}, () => Math.floor(Math.random() * 2500) + 1000);
                trafficChart.update();
                
                addLog("Données du dashboard synchronisées.", "info");
            }, 600);
        });
    </script>
</body>
</html>
