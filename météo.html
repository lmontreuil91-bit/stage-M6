<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

    <div class="p-8">
        <h1 class="text-3xl font-bold">Météo</h1>
            <p class="mt-2 text-slate-600">
            C'est ici que tu peux voir la météo.
        </p>

    <style>
        <body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #0078d4;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .description {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* Style des boutons de sélection de ville */
        .btn-selection {
            background-color: #f0f4f8;
            color: #0078d4;
            border: 2px solid #0078d4;
            padding: 8px 16px;
            margin: 0 5px 20px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .btn-selection:hover {
            background-color: #0078d4;
            color: white;
        }
        #meteo-liste {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
            text-align: left;
        }
        .meteo-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .meteo-item:last-child {
            border-bottom: none;
        }
        .date {
            font-weight: bold;
        }
        .temp-max {
            color: #d83b01;
            font-weight: bold;
        }
        .temp-min {
            color: #0078d4;
        }
        .chargement {
            color: #666;
            font-style: italic;
            margin: 20px 0;
        }
        /* Bouton retour en bas */
        .btn-retour {
            display: inline-block;
            background-color: #415fff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-retour:hover {
            background-color: #344ed1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Météo</h1>
        <p class="description">C'est ici que tu peux voir la météo.</p>

        <div>
            <button class="btn-selection" onclick="changerVille(48.866667, 2.333333, 'Paris')">Paris</button>
            <button class="btn-selection" onclick="changerVille(44.837789, -0.57918, 'Bordeaux')">Bordeaux</button>
            <button class="btn-selection" onclick="changerVille(event, 43.296482, 5.36978, 'Marseille')">Marseille</button>
            <button class="btn-selection" onclick="changerVille(event, 47.218371, -1.553621, 'Nantes')">Nantes</button>
        </div>

        <div style="background: #fafafa; border-radius: 8px; padding: 15px; border: 1px solid #eee;">
            <h3 id="ville-titre" style="margin-top: 0; color: #333;">Météo à Paris</h3>
            <div id="loading" class="chargement">Chargement des prévisions...</div>
            <ul id="meteo-liste"></ul>
 <div>
            <a href="test.html"
        class="btn-retour">Retour à l'application 
           </a>
</div>

    <script>
        async function ObtenirMeteo(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Paris`;
            const listeElement = document.getElementById('meteo-liste');
            const loadingElement = document.getElementById('loading');

            // Reset l'affichage
            listeElement.innerHTML = "";
            loadingElement.style.display = 'block';

            try {
                const reponse = await fetch(url);
                if (!reponse.ok) throw new Error(`Erreur HTTP : ${reponse.status}`);

                const donnees = await reponse.json();
                loadingElement.style.display = 'none';

                const dates = donnees.daily.time;
                const tempMax = donnees.daily.temperature_2m_max;
                const tempMin = donnees.daily.temperature_2m_min;
                const unite = donnees.daily_units.temperature_2m_max;

                for (let i = 0; i < dates.length; i++) {
                    const dateOption = { weekday: 'short', day: 'numeric', month: 'short' };
                    const dateFormatee = new Date(dates[i]).toLocaleDateString('fr-FR', dateOption);

                    const li = document.createElement('li');
                    li.className = 'meteo-item';
                    li.innerHTML = `
                        <span class="date">${dateFormatee}</span>
                        <div>
                            <span class="temp-max">↑ ${tempMax[i]}${unite}</span> / 
                            <span class="temp-min">↓ ${tempMin[i]}${unite}</span>
                        </div>
                    `;
                    listeElement.appendChild(li);
                }
            } catch (erreur) {
                loadingElement.textContent = "Impossible de charger la météo.";
                console.error(erreur);
            }
function changerVille(event, lat, lon, nomVille) {
    event.preventDefault(); // Bloque la remontée automatique de la page
    document.getElementById('ville-titre').textContent = `Météo à ${nomVille}`;
    ObtenirMeteo(lat, lon);
}

        // Charger Paris par défaut au démarrage
        ObtenirMeteo(48.866667, 2.333333);
    </script>

</body>
</html>
